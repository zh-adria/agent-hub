server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql6.sqlpub.com:3311/dev_2026?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: dev_2026
    password: ENC(Xnj/c/rYvcBYYViSGQOZdcZjS93Fww2hLYKuU9IP6FEczEFDeA+tFw==)
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false

  # Run schema.sql and data.sql on startup
  sql:
    init:
      mode: always
      platform: mysql
      schema-locations: classpath:db/init/schema.sql
      data-locations: classpath:db/init/data.sql
  redis:
    host: localhost
    port: 6379
    timeout: 3000ms

# Jasypt encryption
jasypt:
  encryptor:
    password: ${AGENTHUB_DB_ENCRYPTION_KEY:LSY@!0924}

# Sa-Token 配置（轻量级 SSO 认证框架）
sa-token:
  token-name: satoken              # Token 名称
  timeout: 7200                    # Token 有效期（秒），默认 2 小时
  active-timeout: 0                # 活跃续期超时（秒），0=不启用
  is-concurrent: true              # 是否允许同时登录
  is-read-cookie: false            # 是否从 Cookie 读取 Token
  is-read-header: true             # 是否从 Header 读取 Token
  is-log: false                    # 是否输出操作日志
  jwt-secret-key:                  # JWT 模式密钥（留空使用 Session 模式）
  is-jwt: false                    # 是否启用 JWT 模式

# LLM Gateway
token-router:
  base-url: http://127.0.0.1:8082
  completion-path: /api/chat/completions
  stream-completion-path: /api/chat/completions/stream

agenthub:
  identity:
    provider: sa-token
  ai:
    embedding:
      external-enabled: false
      url:
      provider: llm-gateway
      model: text-embedding
      timeout-ms: 3000
      fallback-on-failure: true
    rerank:
      external-enabled: false
      url:
      model: rerank-default
      timeout-ms: 3000
      fallback-on-failure: true
    milvus:
      enabled: false
      url:
      collection-prefix: agenthub
      timeout-ms: 3000
      fallback-on-failure: true
