server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/agent_hub?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  redis:
    host: redis
    port: 6379
    timeout: 3000ms

token-router:
  base-url: http://host.docker.internal:8082
  completion-path: /api/chat/completions
  stream-completion-path: /api/chat/completions/stream

agenthub:
  identity:
    provider: iam
    iam:
      base-url: http://host.docker.internal:8080/iam
      client-id: demo-client
      client-secret: demo-secret
