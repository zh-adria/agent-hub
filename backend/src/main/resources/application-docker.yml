server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql6.sqlpub.com:3311/dev_2026?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: dev_2026
    password: ${AGENTHUB_MYSQL_PASSWORD:ENC(utE3c/kW3Sp+I1qSjaWOck+dp/EQSZVE)}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false

token-router:
  base-url: http://host.docker.internal:8082
  completion-path: /api/chat/completions
  stream-completion-path: /api/chat/completions/stream

# Jasypt encryption
jasypt:
  encryptor:
    password: ${AGENTHUB_DB_ENCRYPTION_KEY:LSY@!0924}

agenthub:
  db:
    encryption:
      key: ${AGENTHUB_DB_ENCRYPTION_KEY:LSY@!0924}
  identity:
    provider: logto
    logto:
      issuer: ${AGENTHUB_LOGTO_ISSUER:https://your-tenant.logto.app}
      client-id: ${AGENTHUB_LOGTO_CLIENT_ID:}
      client-secret: ${AGENTHUB_LOGTO_CLIENT_SECRET:}
      expected-audience: ${AGENTHUB_LOGTO_EXPECTED_AUDIENCE:}
      enable-userinfo-fallback: true
      fallback-to-scope-only: false
      jwks-cache-ttl-ms: 3600000
      management-api-base-url: ${AGENTHUB_LOGTO_MGMT_API:}
    iam:
      base-url: http://host.docker.internal:8080/iam
      client-id: demo-client
      client-secret: ENC(3g4vZdXUIXv4p88Ijs4jMqVuVanlbr2Xx+a1DnOj6Pc=)
  ai:
    embedding:
      external-enabled: true
      url:
      provider: llm-gateway
      model: text-embedding
      timeout-ms: 3000
      fallback-on-failure: true
    rerank:
      external-enabled: true
      url:
      model: rerank-default
      timeout-ms: 3000
      fallback-on-failure: true
    milvus:
      enabled: true
      url: http://milvus-adapter:8080
      collection-prefix: agenthub
      timeout-ms: 3000
      fallback-on-failure: true
