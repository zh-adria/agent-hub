server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:agenthub-dev;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
  sql:
    init:
      mode: never
  redis:
    host: localhost
    port: 6379
    timeout: 3000ms

token-router:
  base-url: http://127.0.0.1:8082
  completion-path: /api/chat/completions
  stream-completion-path: /api/chat/completions/stream

agenthub:
  identity:
    provider: mock
    logto:
      issuer: https://your-tenant.logto.app
      client-id: ""
      client-secret: ""
      expected-audience: ""
      enable-userinfo-fallback: true
      fallback-to-scope-only: false
      jwks-cache-ttl-ms: 3600000
    iam:
      base-url: http://127.0.0.1:8080/iam
      client-id: demo-client
      client-secret: demo-secret
