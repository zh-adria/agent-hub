version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agenthub-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: agent_hub
      MYSQL_USER: agenthub
      MYSQL_PASSWORD: agenthub123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d
    networks:
      - agenthub-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agenthub-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agenthub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agenthub-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agenthub-network
    environment:
      QDRANT_API_KEY: agenthub_qdrant_key

  rocketmq:
    image: rocketmqinc/rocketmq:4.9.4
    container_name: agenthub-rocketmq
    restart: always
    ports:
      - "9876:9876"
      - "10911:10911"
      - "10909:10909"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms512m"
    volumes:
      - rocketmq_data:/root/rocketmq
    networks:
      - agenthub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenthub-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: agent_hub
      MYSQL_USER: agenthub
      MYSQL_PASSWORD: agenthub123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      ROCKETMQ_HOST: rocketmq
      ROCKETMQ_PORT: 9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agenthub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agenthub-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - agenthub-network

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  rocketmq_data:

networks:
  agenthub-network:
    driver: bridge